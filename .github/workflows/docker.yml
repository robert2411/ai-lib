name: Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build-and-health:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw --batch-mode -DskipTests package

      - name: Build Docker image
        run: docker build -t ai-review:ci .

      - name: Run container
        run: |
          docker run -d --name ai-review \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:h2:mem:aprrs \
            ai-review:ci

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 2
          done
          docker logs ai-review
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f ai-review
