<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - AI Library">AI Library</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script th:src="@{/js/htmx.min.js}"></script>
</head>
<body hx-boost="true">

<nav class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">AI Library</a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/browse}">Browse</a>
            <a sec:authorize="hasRole('EDITOR')" th:href="@{/artifacts/new}">New</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
        </div>
        <div class="user-info" sec:authorize="isAuthenticated()">
            <span class="username" sec:authentication="name">user</span>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container">
    <div class="flash-messages">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
    </div>

    <div layout:fragment="content"></div>
</main>

<div layout:fragment="scripts"></div>

</body>
</html>
