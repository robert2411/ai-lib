<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<nav th:fragment="pagination(currentPage, totalPages, baseUrl)" class="pagination" th:if="${totalPages > 1}">
    <a th:if="${currentPage > 0}"
       th:href="${baseUrl + '&page=' + (currentPage - 1)}"
       class="prev">&laquo; Prev</a>
    <span th:if="${currentPage == 0}" class="disabled">&laquo; Prev</span>

    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <span th:if="${i == currentPage}" class="active" th:text="${i + 1}">1</span>
        <a th:unless="${i == currentPage}"
           th:href="${baseUrl + '&page=' + i}"
           th:text="${i + 1}">1</a>
    </th:block>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="${baseUrl + '&page=' + (currentPage + 1)}"
       class="next">Next &raquo;</a>
    <span th:if="${currentPage >= totalPages - 1}" class="disabled">Next &raquo;</span>
</nav>
</body>
</html>
