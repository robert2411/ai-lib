<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${pageTitle}">Edit Artifact</title>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 th:text="${pageTitle}">Edit Artifact</h1>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <form th:object="${form}" th:action="@{/artifacts/save}" method="post" id="artifact-form">
        <div class="card" style="padding:1.5rem;margin-bottom:1.5rem;">
            <h3>Metadata</h3>

            <div class="form-group">
                <label for="name">Name (slug)</label>
                <input type="text" id="name" th:field="*{name}" th:readonly="${!isNew}" placeholder="my-artifact-name"/>
                <small class="text-muted" th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:#dc3545;"></small>
            </div>

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" th:field="*{title}" placeholder="Human-readable title"/>
            </div>

            <div class="form-group">
                <label for="type">Type</label>
                <select id="type" th:field="*{type}">
                    <option value="">Select type...</option>
                    <option th:each="t : ${types}" th:value="${t.slug()}" th:text="${t.slug()}">type</option>
                </select>
                <small class="text-muted" th:if="${#fields.hasErrors('type')}" th:errors="*{type}" style="color:#dc3545;"></small>
            </div>

            <div class="form-group">
                <label for="version">Version</label>
                <input type="text" id="version" th:field="*{version}" placeholder="1.0.0"/>
                <small class="text-muted" th:if="${#fields.hasErrors('version')}" th:errors="*{version}" style="color:#dc3545;"></small>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="3" placeholder="Short description"></textarea>
            </div>

            <div class="form-group">
                <label>Harnesses</label>
                <div style="display:flex;gap:1rem;">
                    <label th:each="h : ${allHarnesses}" style="font-weight:normal;">
                        <input type="checkbox" th:field="*{harnesses}" th:value="${h.slug()}"/> <span th:text="${h.slug()}">harness</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="tags">Tags (comma-separated)</label>
                <input type="text" id="tags" th:field="*{tags}" placeholder="tag1, tag2, tag3"/>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" th:field="*{category}" placeholder="Category"/>
            </div>

            <div class="form-group">
                <label for="language">Language</label>
                <input type="text" id="language" th:field="*{language}" placeholder="java, python, etc."/>
            </div>

            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" th:field="*{author}" placeholder="Author name"/>
            </div>

            <div class="form-group">
                <label for="visibility">Visibility</label>
                <select id="visibility" th:field="*{visibility}">
                    <option value="team">Team</option>
                    <option value="private">Private</option>
                </select>
            </div>
        </div>

        <div class="card" style="padding:1.5rem;margin-bottom:1.5rem;">
            <h3>Content</h3>
            <div class="form-group">
                <textarea id="content-textarea" th:field="*{content}" style="display:none;"></textarea>
                <div id="monaco-editor" style="height:400px;border:1px solid #ddd;border-radius:4px;"></div>
            </div>
        </div>

        <div style="display:flex;gap:1rem;align-items:center;">
            <button type="submit" class="btn btn-primary">Save Artifact</button>
            <a th:href="@{/browse}" class="btn btn-secondary">Cancel</a>
            <div th:unless="${isNew}" style="margin-left:auto;">
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </form>

    <!-- Delete form (separate) -->
    <form th:unless="${isNew}" id="delete-form"
          th:action="@{/artifacts/{slug}/delete(slug=${form.name})}" method="post" style="display:none;">
    </form>

</div>

<div layout:fragment="scripts">
    <script>
        function confirmDelete() {
            if (confirm('Are you sure you want to delete this artifact? This cannot be undone.')) {
                document.getElementById('delete-form').submit();
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            var textarea = document.getElementById('content-textarea');
            var editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: textarea.value || '',
                language: 'markdown',
                theme: 'vs',
                minimap: { enabled: false },
                wordWrap: 'on',
                fontSize: 14,
                lineNumbers: 'on',
                scrollBeyondLastLine: false
            });

            // Sync editor content to textarea on form submit
            document.getElementById('artifact-form').addEventListener('submit', function () {
                textarea.value = editor.getValue();
            });
        });
    </script>
</div>
</body>
</html>
