spring:
  application:
    name: agent-library

server:
  port: 8080

library:
  data-dir: ./data
  repo-path: ./data/library.git
  work-path: ./data/library-work
  users-file: ./data/users.yaml

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
